services:
  djbrain:
    build: .
    ports:
      - "5180:5180"
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    volumes:
      # Persistent app data (settings, cache, logs)
      - djbrain-data:/data
      # Mount your music library (read/write for imports & tagging)
      - ${DJBRAIN_HOST_MUSIC_PATH:-/home/marc/Dropbox/music}:/music
    env_file: .env.docker
    environment:
      DJBRAIN_DATA_DIR: /data
      DJBRAIN_REDIS_URL: redis://redis:6379
      DJBRAIN_POSTGRES_URL: postgresql://djbrain:djbrain@postgres:5432/djbrain
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: djbrain
      POSTGRES_PASSWORD: djbrain
      POSTGRES_DB: djbrain
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U djbrain -d djbrain"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # Optional: Soulseek daemon for P2P search/download
  # slskd:
  #   image: slskd/slskd
  #   ports:
  #     - "5030:5030"
  #   volumes:
  #     - slskd-data:/app
  #     - /path/to/your/music:/music
  #   environment:
  #     SLSKD_REMOTE_CONFIGURATION: "true"

volumes:
  djbrain-data:
  postgres-data:
  # slskd-data:
